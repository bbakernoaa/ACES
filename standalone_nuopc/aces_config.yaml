# aces_config.yaml
# Configuration for the standalone NUOPC driver.

# Meteorology mapping: maps internal component names to ESMF field names
met_mapping:
  temperature: air_temperature
  wind_speed_10m: wind_speed_10m

# Species layers and scaling operations
species:
  nox:
    - field: "base_anthropogenic_nox"
      operation: "add"
      scale: 1.0
    - field: "temperature"
      operation: "add"
      scale: 1.0e-12

# Active physics plugins (none for this basic example)
physics_schemes: []

# Diagnostics configuration
diagnostics:
  - total_nox_emissions
